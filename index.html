<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GitHub 오늘의 트렌딩 레포</title>
  <meta name="description" content="최근 하루 동안 GitHub에서 가장 화제가 된 레포지토리를 GitHub API로 보여줍니다." />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="site-header">
    <h1>🔥 GitHub 오늘의 트렌딩</h1>
    <p class="subtitle">최근 하루 동안 가장 많이 화제가 된 레포지토리</p>
  </header>

  <nav class="controls">
    <label>
      기간
      <select id="period">
        <option value="1">최근 1일</option>
        <option value="3">최근 3일</option>
        <option value="7">최근 7일</option>
      </select>
    </label>
    <label>
      언어
      <select id="language">
        <option value="">전체</option>
        <option value="JavaScript">JavaScript</option>
        <option value="TypeScript">TypeScript</option>
        <option value="Python">Python</option>
        <option value="Go">Go</option>
        <option value="Rust">Rust</option>
        <option value="Java">Java</option>
        <option value="C++">C++</option>
        <option value="C">C</option>
        <option value="Swift">Swift</option>
        <option value="Kotlin">Kotlin</option>
      </select>
    </label>
    <button id="refresh" type="button">새로고침</button>
  </nav>

  <main>
    <p id="status" class="status" aria-live="polite">불러오는 중…</p>
    <ul id="repo-list" class="repo-list"></ul>
  </main>

  <footer class="site-footer">
    <p>데이터 출처: <a href="https://docs.github.com/en/rest/search" target="_blank" rel="noopener">GitHub Search API</a> · 최종 갱신: <span id="updated">-</span></p>
    <p class="note">미인증 호출은 분당 10회로 제한됩니다. 화제도는 "기간 내 생성 + 스타 순"으로 근사합니다.</p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
